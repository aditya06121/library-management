name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "server/**"

jobs:
  deploy-backend:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Prepare directories
        run: mkdir -p $HOME/apps/fullstack-app/server

      - name: Install backend production dependencies
        working-directory: server
        run: npm install --omit=dev

      - name: Deploy backend
        run: rsync -av --delete server/ $HOME/apps/fullstack-app/server/

      - name: Restart backend
        run: sudo systemctl restart app
